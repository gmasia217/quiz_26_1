<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My Pharmacy LMS</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LMS 홈">
<meta name="theme-color" content="#0d6efd">
<link rel="manifest" id="manifest">
<script>
    // 홈 화면 추가 시 약(💊) 아이콘이 뜨도록 설정
    const manifest = {
        "name": "내 강의실 (Pharmacy LMS)",
        "short_name": "LMS 홈",
        "display": "standalone",
        "start_url": ".",
        "background_color": "#f8f9fa",
        "theme_color": "#0d6efd",
        "icons": [{
            "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230d6efd'/%3E%3Ctext x='50' y='65' font-size='50' fill='white' text-anchor='middle'%3E💊%3C/text%3E%3C/svg%3E",
            "sizes": "192x192",
            "type": "image/svg+xml"
        }]
    };
    document.getElementById('manifest').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
</script>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        background-color: #f8f9fa;
        color: #333;
    }
    .breadcrumb {
        padding: 15px 30px;
        background-color: #fff;
        border-bottom: 1px solid #dee2e6;
        color: #6c757d;
        font-size: 14px;
        font-weight: bold;
    }
    #dashboard-container {
        padding: 40px 30px;
        max-width: 1000px;
        margin: 0 auto;
    }
    .course-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
        margin-top: 30px;
    }
    .course-card {
        background: #fff;
        border: 1px solid #dee2e6;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        text-align: center;
    }
    .course-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }
    .course-card:hover h3.c-blue { color: #0b5ed7 !important; }
    .course-card:hover h3.c-green { color: #157347 !important; }
    .course-card:hover h3.c-purple { color: #59339d !important; }

    .course-icon {
        font-size: 40px;
        margin-bottom: 15px;
    }
    .course-card h3 {
        margin: 0 0 10px 0;
        font-size: 22px;
        transition: color 0.2s;
    }
    .course-card p {
        margin: 0;
        color: #6c757d;
        font-size: 15px;
    }
</style>
</head>
<body>

    <div class="breadcrumb">
        🏠 / 내 강의실 홈
    </div>

    <div id="dashboard-container">
        <h1 style="margin-top: 0; color: #333;">내 강의실 (LMS)</h1>
        <p style="color: #6c757d; font-size: 16px;">학습할 과목을 선택하세요.</p>
        
        <div class="course-grid">
            <div class="course-card" onclick="location.href='./약물치료학2/index.html'">
                <div class="course-icon">💊</div>
                <h3 class="c-blue" style="color:#0d6efd;">약물치료학 2</h3>
                <p>CV 퀴즈 및 중간고사 대비</p>
            </div>

            <div class="course-card" onclick="location.href='./제약실무이론/index.html'">
                <div class="course-icon">🏭</div>
                <h3 class="c-green" style="color:#198754;">제약실무이론</h3>
                <p>2025 기말고사 대비 퀴즈</p>
            </div>

            <div class="course-card" onclick="location.href='./첨단제제기술/index.html'">
                <div class="course-icon">🔬</div>
                <h3 class="c-purple" style="color:#6f42c1;">첨단제제기술</h3>
                <p>퀴즈 목록 업데이트 대기 중</p>
            </div>
        </div>
    </div>

</body>
</html>
