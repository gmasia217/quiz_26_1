<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>약물치료학2 - LMS</title>
<meta name="theme-color" content="#0d6efd">
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        margin: 0; background-color: #f8f9fa; color: #333;
    }
    .breadcrumb {
        padding: 15px 30px; background-color: #fff; border-bottom: 1px solid #dee2e6;
        color: #6c757d; font-size: 14px; font-weight: bold;
    }
    .breadcrumb a { text-decoration: none; color: inherit; }
    .breadcrumb a:hover { color: #0d6efd; text-decoration: underline; }
    #dashboard-container { padding: 40px 30px; max-width: 1000px; margin: 0 auto; }
    .course-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px; margin-top: 30px;
    }
    .course-card {
        background: #fff; border: 1px solid #dee2e6; border-radius: 12px;
        padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s; text-align: center;
    }
    .course-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    .course-icon { font-size: 40px; margin-bottom: 15px; }
    .course-card h3 { margin: 0 0 10px 0; font-size: 22px; }
    .course-card p { margin: 0; color: #6c757d; font-size: 15px; }
</style>
</head>
<body>
    <div class="breadcrumb">
        <a href="../index.html">🏠 홈</a> / 약물치료학2
    </div>

    <div id="dashboard-container">
        <h1 style="margin-top: 0; color: #333;">약물치료학2</h1>
        <p style="color: #6c757d; font-size: 16px;">학습할 시험 범위를 선택하세요.</p>
        
        <div class="course-grid">
            <div class="course-card" onclick="location.href='./기말/index.html'">
                <div class="course-icon">🎯</div>
                <h3 style="color:#0d6efd;">기말고사 대비</h3>
                <p>VTE, ID 퀴즈 등 (총 4개 세트)</p>
            </div>

            <div class="course-card" onclick="location.href='./중간/index.html'">
                <div class="course-icon">📚</div>
                <h3 style="color:#198754;">중간고사 대비</h3>
                <p>CV 족보 및 지질 등 (총 6개 세트)</p>
            </div>
        </div>
    </div>
</body>
</html>
