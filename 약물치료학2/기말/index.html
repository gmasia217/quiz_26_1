    function toggleMode() {
        if (!confirm('모드를 변경하면 답안이 초기화됩니다. 계속하시겠습니까?')) return;
        isEssayMode = !isEssayMode;

        const modeIndicator = document.getElementById('mode-indicator');
        
        if (isEssayMode) {
            toggleBtn.innerText = '🔘 객관식 모드로 돌아가기';
            modeIndicator.innerText = '[서술형 모드]';
            modeIndicator.style.color = '#dc3545';

            modeIndicator.style.color = '#0d6efd';
        }
        resetQuizState();
        init();
    }

    function shuffleQuiz() {
        if (!confirm('문항과 보기를 섞으시겠습니까?')) return;
        for (let i = activeQuizData.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [activeQuizData[i], activeQuizData[j]] = [activeQuizData[j], activeQuizData[i]];
        }
        activeQuizData.forEach(q => {
            const hasCombo = q.options.some(opt => /^\d+(,\s*\d+)+$/.test(opt));
            const isTF = q.options.length === 2 && q.options.includes("True");
            if (!hasCombo && !isTF && q.options.length > 1 && q.type !== 'essay') {
                const correctText = q.options[q.answer];
                q.options.sort(() => Math.random() - 0.5);
                q.answer = q.options.indexOf(correctText);
            }
        });
        resetQuizState();
        init();
    }

    function resetOrder() {
        activeQuizData = JSON.parse(JSON.stringify(currentOriginalData));

        document.getElementById('results-container').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        document.getElementById('app-sidebar').style.display = 'flex';

    function init() {
        renderNavGrid();
        renderQuestion(currentQuestion);
    }

    function renderNavGrid() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = '';
        for (let i = 0; i < activeQuizData.length; i++) {
            const btn = document.createElement('div');
            btn.className = 'nav-btn';
            if (i === currentQuestion) btn.classList.add('active');
            if (userAnswers[i] !== null && userAnswers[i] !== '') btn.classList.add('answered');
            if (flaggedQuestions[i]) btn.classList.add('flagged');
            btn.innerText = i + 1;
            btn.onclick = () => { currentQuestion = i; renderQuestion(currentQuestion); };
            grid.appendChild(btn);
        }
    }

    function renderQuestion(index) {
        const q = activeQuizData[index];
        document.getElementById('q-number-display').innerText = `Question ${index + 1}`;
        const hasAns = userAnswers[index] !== null && userAnswers[index] !== '';
        document.getElementById('q-status-display').innerText = hasAns ? 'Complete' : 'Not yet answered';
        document.getElementById('flag-btn-display').innerHTML = flaggedQuestions[index] ? '🚩 Remove flag' : '🚩 Flag question';
        
        let guidelineText = q.guideline || '';
        if (q.type === 'essay' && !isEssayMode) {
            guidelineText += ' <span style="color:#dc3545;">[이 문제는 서술형 주관식입니다]</span>';
        }
        document.getElementById('guideline-display').innerHTML = guidelineText;
        
        document.getElementById('q-text-display').innerText = q.text;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        if (isEssayMode || q.type === 'essay') {
            const area = document.createElement('textarea');
            area.className = 'essay-input';
            area.placeholder = '여기에 서술형 답안을 직접 입력하세요...';
            area.value = userAnswers[index] || '';
            area.oninput = (e) => {
                userAnswers[currentQuestion] = e.target.value.trim() || null;
                renderNavGrid();
            };
            container.appendChild(area);
        } else {
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                const rad = document.createElement('input');
                rad.type = 'radio'; rad.name = 'opt'; rad.id = 'o'+i;
                rad.checked = userAnswers[index] === i;
                rad.onchange = () => { userAnswers[currentQuestion] = i; renderNavGrid(); };
                const lab = document.createElement('label');
                lab.htmlFor = 'o'+i; lab.innerText = `${i+1}. ${opt}`;
                div.append(rad, lab);
                container.appendChild(div);
            });
        }
        document.getElementById('prev-btn').style.visibility = index === 0 ? 'hidden' : 'visible';
        const next = document.getElementById('next-btn');
        next.innerText = index === activeQuizData.length - 1 ? 'Finish attempt ...' : 'Next page';
        next.onclick = index === activeQuizData.length - 1 ? showResults : () => { currentQuestion++; renderQuestion(currentQuestion); };
    }

    function clearChoice() { userAnswers[currentQuestion] = null; renderQuestion(currentQuestion); }
    function changeQuestion(s) { currentQuestion += s; renderQuestion(currentQuestion); }
    function toggleFlag() { flaggedQuestions[currentQuestion] = !flaggedQuestions[currentQuestion]; renderQuestion(currentQuestion); }

        const incorrect = activeQuizData.filter((q, i) => {

                const u = (userAnswers[i] || '').toLowerCase().replace(/\s+/g, '');
                const c = q.options[q.answer].toLowerCase().replace(/\s+/g, '');
                return u !== c;
            }
            return userAnswers[i] !== q.answer;

        if (incorrect.length === 0) return alert('모두 정답입니다!');
        activeQuizData = incorrect;
        resetQuizState();
        document.getElementById('results-container').style.display = 'none';

            }
            
            if (correct) score++;
            
            const item = document.createElement('div');
            item.className = `result-item ${correct ? 'correct' : 'incorrect'}`;
            
            let statusHTML = `<span class="status-badge ${correct?'status-correct':'status-incorrect'}">${correct?'✔ 정답':'✘ 오답'}</span>`;
            if (q.type === 'essay' && !isEssayMode) {
                statusHTML = `<span class="status-badge status-correct" style="color: #0d6efd;">📝 제출 완료 (직접 채점)</span>`;
                if (userAnswers[i] && userAnswers[i].trim() !== '') score++; 
            }

            item.innerHTML = `
                ${statusHTML}
                <div style="font-size:14px; color:#0d6efd;">${q.guideline || ''}</div>
                <div style="font-weight:bold; margin:10px 0;">${q.text}</div>
                <div style="color:#6c757d;">나의 답:<br> <span style="display:inline-block; margin-top:5px; padding:10px; background:#f8f9fa; border:1px solid #dee2e6; width:100%; box-sizing:border-box;">${uText}</span></div>
                ${!correct || isEssayMode || q.type === 'essay' ? `<div style="color:#198754; font-weight:bold; margin-top:10px;">모범 답안:<br> <span style="display:inline-block; margin-top:5px; padding:10px; background:#eaf4fb; border:1px solid #bce8f1; width:100%; box-sizing:border-box; color:#333;">${cText.replace(/\n/g, '<br>')}</span></div>` : ''}
            `;
            list.appendChild(item);
        });
        
        document.getElementById('score-display').innerText = `${activeQuizData.length}문항 중 ${score}문항 정답 (${Math.round(score/activeQuizData.length*100)}%)`;
        document.getElementById('retry-incorrect-btn').style.display = score === activeQuizData.length ? 'none' : 'inline-block';
    }

    showDashboard();
</script>
</body>
</html>
